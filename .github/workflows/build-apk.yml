name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Install Capacitor Assets generator
        run: npm install --save-dev @capacitor/assets
      
      - name: Convert SVG to PNG
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 1024 -h 1024 resources/icon.svg -o resources/icon.png
          rsvg-convert -w 2732 -h 2732 resources/splash.svg -o resources/splash.png
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Generate icons and splash
        run: npx capacitor-assets generate --android
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Force cleartext traffic in Android manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo "=== Manifest BEFORE patch ==="
          cat $MANIFEST
          if grep -q 'android:usesCleartextTraffic' $MANIFEST; then
            sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/g' $MANIFEST
          else
            sed -i 's|<application |<application android:usesCleartextTraffic="true" |g' $MANIFEST
          fi
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          if ! grep -q 'android:networkSecurityConfig' $MANIFEST; then
            sed -i 's|<application |<application android:networkSecurityConfig="@xml/network_security_config" |g' $MANIFEST
          fi
          echo "=== Manifest AFTER patch ==="
          cat $MANIFEST
      
      - name: Build APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk KrakenTerminal-v1.0.apk
          ls -la KrakenTerminal-v1.0.apk
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: KrakenTerminal-APK
          path: KrakenTerminal-v1.0.apk
          retention-days: 90
      
      - name: Create Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: KrakenTerminal v1.0 build ${{ github.run_number }}
          body: |
            Kraken Terminal Mobile APK
            Build ${{ github.run_number }}
            Commit ${{ github.sha }}
          files: KrakenTerminal-v1.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
