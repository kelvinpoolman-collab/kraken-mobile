<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern (terminal feel) -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>
  
  <!-- Glow halo -->
  <circle cx="512" cy="512" r="280" fill="url(#cyan)" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Main diamond (◆) -->
  <g transform="translate(512, 512)">
    <!-- Outer glow -->
    <path d="M 0,-220 L 220,0 L 0,220 L -220,0 Z" fill="url(#cyan)" opacity="0.25" filter="url(#glow)"/>
    <!-- Diamond shape -->
    <path d="M 0,-200 L 200,0 L 0,200 L -200,0 Z" 
          fill="url(#cyan)" 
          stroke="#22d3ee" 
          stroke-width="6"/>
    <!-- Inner highlight -->
    <path d="M 0,-160 L 60,-100 L 0,-50 L -60,-100 Z" fill="#67e8f9" opacity="0.6"/>
    <!-- Center accent -->
    <circle cx="0" cy="0" r="20" fill="#020617" opacity="0.4"/>
    <circle cx="0" cy="0" r="14" fill="#22d3ee"/>
  </g>
  
  <!-- Bottom: chart line indicator -->
  <g transform="translate(512, 760)" opacity="0.7">
    <polyline points="-180,30 -90,10 0,-10 90,-25 180,-40" 
              fill="none" 
              stroke="#22d3ee" 
              stroke-width="6" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    <circle cx="180" cy="-40" r="8" fill="#22d3ee"/>
  </g>
  
  <!-- KT initials subtle background -->
  <text x="512" y="240" 
        font-family="system-ui, sans-serif" 
        font-size="60" 
        font-weight="800" 
        fill="#22d3ee" 
        opacity="0.4" 
        text-anchor="middle"
        letter-spacing="8">KT</text>
</svg>
